[env]
_.path = ['{{config_root}}/node_modules/.bin']

[tasks.build]
description = "Builds the project artifacts."
depends = ["clean"]
run = [{ tasks = ["build:esm", "build:cjs"] }, "scripts/post-build.sh"]

[tasks."build:esm"]
description = "Builds the library as an ESM module."
run = "tsc -b tsconfig.build.esm.json"

[tasks."build:cjs"]
description = "Builds the library as a CommonJS module."
run = "tsc -b tsconfig.build.cjs.json"

[tasks.ci]
description = "Runs CI tasks in parallel."
run = [{ tasks = ["lint", "compile", "test:coverage:lcov"] }]

[tasks.clean]
description = "Removes build artifacts."
run = "rm -rf lib && rm -f infra-blocks-*.tgz"

[tasks.compile]
description = "Compiles the project."
run = "tsc"

[tasks.lint]
description = "Runs the linter on the project."
run = "biome ci"

[tasks.fix]
description = "Fixes project files."
run = "biome check --write"

[tasks.test]
description = "Runs unit and integration tests in parallel."
run = [{ task = "test:unit" }, { task = "test:integration" }]

[tasks."test:coverage"]
description = "Runs and displays code coverage in human readable format."
run = "c8 mise run test"

[tasks."test:coverage:lcov"]
description = "Runs and cumulates code coverage in lcov format for later reporting."
run = "c8 --reporter=lcov mise run test"

[tasks."test:integration"]
description = "Runs integration tests."
run = "node --import tsx --test 'test/integration/**/*.spec.ts'"

[tasks."test:unit"]
description = "Runs unit tests."
run = "node --import tsx --test 'test/unit/**/*.spec.ts'"

[tools]
biome = "2.4.9"
lefthook = "2.0.8"
